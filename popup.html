<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: linear-gradient(135deg, #0a66c2 0%, #004182 100%); color: #333; }
    .container { padding: 20px; }
    .header { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h2 { color: #0a66c2; font-size: 18px; margin-bottom: 5px; }
    .header p { color: #666; font-size: 13px; }
    .section { background: white; padding: 15px; border-radius: 8px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .section h3 { color: #0a66c2; font-size: 14px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; }
    .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #0a66c2; }
    .checkbox-item label { cursor: pointer; font-size: 14px; flex: 1; }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #0a66c2; }
    .input-group input, .input-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: inherit; resize: vertical; }
    .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #0a66c2; box-shadow: 0 0 0 2px rgba(10, 102, 194, 0.1); }
    .input-group textarea { min-height: 60px; }
    .button-group { display: flex; gap: 10px; margin-top: 15px; }
    button { flex: 1; padding: 10px 16px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #0a66c2; color: white; }
    .btn-primary:hover { background: #004182; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10, 102, 194, 0.3); }
    .btn-secondary { background: #f3f3f3; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e8e8e8; }
    .status { padding: 10px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; display: none; }
    .status.active { display: block; }
    .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .status.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .help-text { font-size: 12px; color: #999; margin-top: 6px; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .stat:last-child { border-bottom: none; }
    .stat-label { color: #666; }
    .stat-value { font-weight: 600; color: #0a66c2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>LinkedIn Auto-Accept</h2>
      <p>Accept connections with smart filtering</p>
    </div>
    <div id="status" class="status"></div>
    <div class="section">
      <h3>⚙️ Options</h3>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="enableFilter" checked>
          <label for="enableFilter">Enable Smart Filtering</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="autoScroll" checked>
          <label for="autoScroll">Auto-scroll to load all</label>
        </div>
      </div>
    </div>
    <div class="section" id="filterSection">
      <h3> Filter by Keywords</h3>
      <div class="input-group">
        <label for="includeKeywords">Include (comma-separated):</label>
        <textarea id="includeKeywords" placeholder="e.g., Engineer, Data Scientist, AI, ML"></textarea>
        <div class="help-text">Only accept if profile contains these keywords</div>
      </div>
      <div class="input-group">
        <label for="excludeKeywords">Exclude (comma-separated):</label>
        <textarea id="excludeKeywords" placeholder="e.g., Recruiter, Sales, Marketing"></textarea>
        <div class="help-text">Reject if profile contains these keywords</div>
      </div>
      <div class="input-group">
        <label for="minConnections">Minimum Mutual Connections:</label>
        <input type="number" id="minConnections" value="0" min="0">
      </div>
    </div>
    <div class="section">
      <h3>📊 Statistics</h3>
      <div class="stat">
        <span class="stat-label">Processed:</span>
        <span class="stat-value" id="processed">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Accepted:</span>
        <span class="stat-value" id="accepted">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Rejected:</span>
        <span class="stat-value" id="rejected">0</span>
      </div>
    </div>
    <div class="button-group">
      <button class="btn-secondary" id="resetBtn">Reset</button>
      <button class="btn-primary" id="startBtn">Start Auto-Accept</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
